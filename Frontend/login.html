<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">AI Job Portal</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <h2>Welcome Back</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 24px; font-weight: 500;">
            Sign in to access your dashboard.
        </p>

        <form id="loginForm" onsubmit="event.preventDefault(); loginSuccess();">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter Email Address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>

            <p style="margin-top: 20px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none;">Register</a>
            </p>
        </form>
    </div>

    <footer>
        <p>© 2026 AI Job Portal</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
