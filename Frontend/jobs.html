<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Jobs - AI Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">AI Job Portal</div>
        <ul class="nav-links">
            <span id="userWelcome"></span>
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="applications.html">Applications</a></li>
            <li><a href="recommendation.html">AI Recommendation</a></li>
            <li><a href="recruiter-dashboard.html">Recruiter</a></li>
            <li><a href="admin-dashboard.html">Admin</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Explore Career Opportunities</h1>

    <div class="search-box">
        <input type="text" id="searchInput" oninput="filterJobs()" placeholder="Search by job title...">
        <select id="companyFilter" onchange="filterJobs()">
            <option value="">All Companies</option>
        </select>
        <select id="locationFilter" onchange="filterJobs()">
            <option value="">All Locations</option>
        </select>
    </div>

    <div class="job-container">
        <!-- Rendered dynamically by script.js -->
    </div>

    <footer>
        <p>© 2026 AI Job Portal</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
