<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">AI Job Portal</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <div class="form-container" style="max-width: 500px; margin: 40px auto;">
        <h2>Create Account</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 24px; font-weight: 500;">
            Sign up to get customized job match recommendations.
        </p>

        <form id="registerForm" onsubmit="event.preventDefault(); registerSuccess();">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter Full Name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password (min 8 characters)</label>
                <input type="password" id="password" placeholder="Create Password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <div class="form-group">
                <label for="skills">Skills (comma-separated)</label>
                <input type="text" id="skills" placeholder="e.g. Java, Python, React" required>
            </div>

            <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Register</button>

            <p style="margin-top: 20px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Sign In</a>
            </p>
        </form>
    </div>

    <footer>
        <p>© 2026 AI Job Portal</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
