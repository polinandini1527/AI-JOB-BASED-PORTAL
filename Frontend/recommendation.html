<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recommendations - AI Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">AI Job Portal</div>
        <ul class="nav-links">
            <span id="userWelcome"></span>
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="applications.html">Applications</a></li>
            <li><a href="recommendation.html">AI Recommendation</a></li>
            <li><a href="recruiter-dashboard.html">Recruiter</a></li>
            <li><a href="admin-dashboard.html">Admin</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <h2>AI Recommendations</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 24px; font-weight: 500;">
            Enter your skills portfolio to find matching jobs dynamically.
        </p>

        <div class="form-group">
            <input type="text" id="skills" placeholder="Enter skills (e.g. Java, Python, React)">
        </div>

        <button class="btn" onclick="recommendJob()"><i class="fas fa-magic"></i> Match My Skills</button>

        <div id="result" style="margin-top: 24px; text-align: center;">
            <!-- Rendered dynamically by script.js -->
        </div>
    </div>

    <footer>
        <p>© 2026 AI Job Portal</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
