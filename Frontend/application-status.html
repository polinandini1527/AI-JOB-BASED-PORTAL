<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Status - AI Job Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">AI Job Portal</div>
        <ul class="nav-links">
            <span id="userWelcome"></span>
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="applications.html">Applications</a></li>
            <li><a href="recommendation.html">AI Recommendation</a></li>
            <li><a href="recruiter-dashboard.html">Recruiter</a></li>
            <li><a href="admin-dashboard.html">Admin</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Application Status Tracking</h1>

    <div class="job-container" id="statusContainer">
        <!-- Rendered dynamically by inline scripts or script.js -->
    </div>

    <footer>
        <p>© 2026 AI Job Portal</p>
    </footer>

    <script>
    const email = localStorage.getItem("email");
    const container = document.getElementById("statusContainer");
    if (email) {
        fetch("http://localhost:8082/applications?email=" + encodeURIComponent(email))
        .then(res => res.json())
        .then(apps => {
            if (apps.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <p>No Applications Yet</p>
                    </div>
                `;
            } else {
                container.innerHTML = "";
                apps.forEach(app => {
                    let badgeClass = "applied";
                    const stat = app.status.toLowerCase();
                    if (stat.includes("shortlist")) badgeClass = "shortlisted";
                    if (stat.includes("reject")) badgeClass = "rejected";
                    if (stat.includes("select")) badgeClass = "selected";

                    container.innerHTML += `
                        <div class="job-card">
                            <h3>${app.jobTitle}</h3>
                            <p>Status: <span class="status ${badgeClass}">${app.status}</span></p>
                        </div>
                    `;
                });
            }
        })
        .catch(err => {
            console.error(err);
            container.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;"><p>Failed to load application status</p></div>`;
        });
    } else {
        container.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
                <p>Please login to view application status</p>
            </div>
        `;
    }
    </script>
    <script src="script.js"></script>
</body>
</html>
